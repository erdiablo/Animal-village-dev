<!DOCTYPE html>
<html lang="en-us">
<head>
    <!-- Ваш существующий код -->
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://telegram.org; script-src 'self' https://telegram.org 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;">
    <title>Unity WebGL Player | Animal Village</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        #unity-container {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
        }
        #unity-canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<div id="unity-container">
    <canvas id="unity-canvas"></canvas>
    <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
        </div>
    </div>
    <div id="unity-warning"> </div>
</div>
<script>
    // Ваш существующий код
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
        // ...
    }
    
    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/Animal village build.loader.js";
    var config = {
        dataUrl: buildUrl + "/Animal village build.data",
        frameworkUrl: buildUrl + "/Animal village build.framework.js",
        codeUrl: buildUrl + "/Animal village build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Animal Village",
        productVersion: "1.0",
        showBanner: unityShowBanner,
    };

    // Проверяем, что Telegram WebApp доступен
    if (window.Telegram && window.Telegram.WebApp) {
        Telegram.WebApp.ready();

        // Расширяем мини-приложение на весь экран
        Telegram.WebApp.expand();

        // Убираем тень (если есть)
        Telegram.WebApp.setBackgroundColor("bg_color");
    } else {
        console.warn("Telegram WebApp не доступен.");
    }

    // Настройка размеров для мобильных устройств
    var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=no';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
    }

    loadingBar.style.display = "block";

    var unityInstance = null;
    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
        }).then((instance) => {
            unityInstance = instance;
            loadingBar.style.display = "none";

            console.log("unityInstance is running!");

            // Если нужно, вызываем функцию получения данных пользователя
            // GetTelegramUserData();

        }).catch((message) => {
            alert(message);
        });
    };
    document.body.appendChild(script);

    // Функция для получения данных пользователя из Telegram WebApp и передачи их в Unity
    function GetTelegramUserData() {
        // ...
    }

</script>
</body>
</html>
