<!DOCTYPE html>
<html lang="en-us">
<head>

    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://telegram.org; script-src 'self' https://telegram.org 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;">
    <title>Unity WebGL Player | Animal Village</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        #unity-container {
            width: 100%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
        }
        #unity-canvas {
            width: 100%;
            height: 100%;
        }
        #unity-loading-bar {
            position: absolute;
            left: 0;
            top: 0;
        }
    </style>
</head>
<body>
<div id="unity-container">
    <canvas id="unity-canvas"></canvas>
    <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
        </div>
    </div>
    <div id="unity-warning"> </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Проверяем доступность Telegram WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            console.log("Telegram WebApp доступен и методы вызваны.");
        } else {
            console.warn("Telegram WebApp не доступен.");
        }

        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var warningBanner = document.querySelector("#unity-warning");

        function unityShowBanner(msg, type) {
            // Ваш существующий код для отображения предупреждений
        }
        
        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/Animal village build.loader.js";
        var config = {
            dataUrl: buildUrl + "/Animal village build.data",
            frameworkUrl: buildUrl + "/Animal village build.framework.js",
            codeUrl: buildUrl + "/Animal village build.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "Animal Village",
            productVersion: "1.0",
            showBanner: unityShowBanner,
        };

        // Настройка мета-тега viewport
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=no';
        document.getElementsByTagName('head')[0].appendChild(meta);

        loadingBar.style.display = "block";

        var unityInstance = null;
        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((instance) => {
                unityInstance = instance;
                loadingBar.style.display = "none";
                console.log("unityInstance is running!");

                // Если нужно, вызываем функцию получения данных пользователя
                // GetTelegramUserData();
            }).catch((message) => {
                alert(message);
            });
        };
        document.body.appendChild(script);

        // Функция для получения данных пользователя из Telegram WebApp и передачи их в Unity
        function GetTelegramUserData() {

        }
    });
</script>
</body>
</html>
